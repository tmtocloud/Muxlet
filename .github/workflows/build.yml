name: Build Package

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Production release version (e.g. 1.3.0). Leave blank for a dev pre-release build."
        required: false
        type: string
      release_notes:
        description: "Release notes (markdown). Leave blank to auto-generate from git log."
        required: false
        type: string

permissions:
  contents: write  # Required to create releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history for commit counting and tags
          fetch-tags: true

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tagged release: use tag name (strip 'v' prefix)
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "pkg_version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "release_name=v$VERSION" >> $GITHUB_OUTPUT
            echo "is_dispatch_release=false" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            # Manual promote: treat as a production release without needing a local tag push
            VERSION="${{ inputs.version }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "pkg_version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "release_name=v$VERSION" >> $GITHUB_OUTPUT
            echo "is_dispatch_release=true" >> $GITHUB_OUTPUT
          else
            # Branch push or unversioned dispatch: pre-release using mfile version.
            # Tag is bare version (e.g. "1.0.6", no "v" prefix) so it is visually
            # distinct from production tags ("v1.0.6") and never matches tags: ['v*'],
            # preventing the production job from firing on CI-created pre tags. The tag
            # stays bare so the same rolling per-version release gets updated by every
            # commit, but the *package* version (pkg_version, injected into mfile below)
            # gets the short sha appended — that's what update.lua and the Settings
            # titlebar parse back out of Mux._version to identify the exact build and
            # decide whether the "v" prefix belongs.
            VERSION=$(jq -r '.version' mfile)
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "pkg_version=${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "release_name=prerelease" >> $GITHUB_OUTPUT
            echo "is_dispatch_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate mfile version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          MFILE_VERSION=$(jq -r '.version' mfile)
          if [[ "$MFILE_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::mfile version ($MFILE_VERSION) does not match tag ($TAG_VERSION). Update mfile before tagging."
            exit 1
          fi
          echo "mfile version matches tag: $TAG_VERSION"

      - name: Inject version into mfile
        run: |
          PKG_VERSION="${{ steps.version.outputs.pkg_version }}"
          tmp=$(mktemp)
          jq --arg v "$PKG_VERSION" '.version = $v' mfile > "$tmp" && mv "$tmp" mfile
          echo "Version set to $PKG_VERSION"

      - name: Build with muddler
        run: docker run --rm -v "$PWD:/work" -w /work demonnic/muddler

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Muxlet-${{ steps.version.outputs.version }}
          path: build/Muxlet.mpackage

      - name: Generate prerelease notes
        if: steps.version.outputs.is_release == 'false'
        id: prerelease_notes
        run: |
          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          if [[ -n "$PREV_TAG" ]]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:'- %s' | head -50)
            SINCE="since ${PREV_TAG}"
          else
            CHANGELOG=$(git log --pretty=format:'- %s' -50)
            SINCE="(all commits)"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "since=$SINCE" >> $GITHUB_OUTPUT

      - name: Update prerelease
        if: steps.version.outputs.is_release == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Pre-release ${{ steps.version.outputs.version }}
          body: |
            Development build for v${{ steps.version.outputs.version }}.

            **Commit:** ${{ github.sha }}

            **Changes ${{ steps.prerelease_notes.outputs.since }}:**
            ${{ steps.prerelease_notes.outputs.changelog }}

            Install URL: `https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/Muxlet.mpackage`

            This is a pre-release. The production release will be tagged `v${{ steps.version.outputs.version }}`.
          prerelease: true
          files: build/Muxlet.mpackage
          fail_on_unmatched_files: true

      - name: Create tag for dispatch releases
        if: steps.version.outputs.is_dispatch_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Generate release notes
        if: steps.version.outputs.is_release == 'true'
        id: release_notes
        env:
          INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # "delta" = just this run's new note; "summary" = what the release body
          # becomes (delta prepended onto whatever notes the release already has,
          # so re-tagging v2.1.0 to add a fix never loses earlier notes).
          if [[ "${{ steps.version.outputs.is_dispatch_release }}" == "true" && -n "$INPUT_RELEASE_NOTES" ]]; then
            DELTA="$INPUT_RELEASE_NOTES"
          elif [[ "${{ steps.version.outputs.is_dispatch_release }}" == "true" ]]; then
            # Auto-generate from git log since the last production tag
            PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
            if [[ -n "$PREV_TAG" ]]; then
              DELTA=$(git log "${PREV_TAG}..HEAD" --pretty=format:'- %s' | head -30)
            else
              DELTA=$(git log --pretty=format:'- %s' -30)
            fi
          else
            # Tag push: read the annotated tag message
            TAG="${GITHUB_REF_NAME}"
            echo "Processing tag: $TAG"
            git fetch --no-tags origin "+refs/tags/$TAG:refs/tags/$TAG"
            if git cat-file -t "$TAG" 2>/dev/null | grep -q '^tag$'; then
              echo "✓ Annotated tag detected"
              DELTA=$(git tag -l --format='%(contents)' "$TAG")
            else
              echo "⚠ Not seeing annotated tag object, falling back"
              DELTA=$(git log -1 --pretty=%B "$TAG^{commit}")
            fi
          fi

          PREV_BODY=$(gh release view "${{ steps.version.outputs.release_name }}" --json body --jq .body 2>/dev/null || true)
          if [[ -n "$PREV_BODY" ]]; then
            SUMMARY="${DELTA}"$'\n\n---\n\n'"${PREV_BODY}"
          else
            SUMMARY="$DELTA"
          fi

          echo "delta<<EOF" >> $GITHUB_OUTPUT
          echo "$DELTA" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete all pre-releases
        if: steps.version.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A production release supersedes every pre-release that came before it,
          # not just one matching this exact version number — mfile can jump ahead
          # mid-development (e.g. a 2.1.1 pre-release whose scope grew into 2.2.0),
          # so only pruning an exact-version match left those orphaned forever.
          # At most one pre-release should exist at a time; wipe them all here.
          PRERELEASES=$(gh release list --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease) | .tagName')
          for tag in $PRERELEASES; do
            gh release delete "$tag" --yes --cleanup-tag
            echo "Deleted pre-release $tag and its tag"
          done

      - name: Create tagged release
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.release_name }}
          body: |
            ${{ steps.release_notes.outputs.summary }}
          draft: false
          prerelease: false
          files: build/Muxlet.mpackage
          fail_on_unmatched_files: true

      - name: Submit to Mudlet package repository
        if: steps.version.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.MUDLET_REPO_PAT }}
          RELEASE_SUMMARY: ${{ steps.release_notes.outputs.summary }}
          RELEASE_DELTA: ${{ steps.release_notes.outputs.delta }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OWNER="$GITHUB_REPOSITORY_OWNER"
          BRANCH="Muxlet-v${VERSION}"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the pre-forked repo (fork must exist at $OWNER/mudlet-package-repository)
          git clone --depth=1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${OWNER}/mudlet-package-repository.git" \
            mudlet-repo

          cd mudlet-repo

          # Re-pushing the same version tag (e.g. to address MPR review feedback) means
          # the branch/PR from a prior run of this version may already be open. Detect
          # that first: an open PR gets a fixup commit on its existing branch instead of
          # main being reset and a fresh branch/PR being created underneath it, which
          # would orphan the open PR's history and make the branch push non-fast-forward.
          # --head takes a bare branch name here, not "owner:branch" (that form silently
          # matches nothing).
          EXISTING_PR=$(gh pr list \
            --repo Mudlet/mudlet-package-repository \
            --head "$BRANCH" --state open \
            --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "Open PR #$EXISTING_PR already tracks $BRANCH — pushing a fixup commit."
            # The clone is shallow/single-branch (implied by --depth=1), so it never
            # populates refs/remotes/origin/$BRANCH — only FETCH_HEAD is usable here.
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" FETCH_HEAD

            cp "$GITHUB_WORKSPACE/build/Muxlet.mpackage" "packages/Muxlet.mpackage"
            git add "packages/Muxlet.mpackage"

            if git diff --cached --quiet; then
              echo "Package unchanged; nothing to push."
            else
              git commit -m "Update Muxlet package (v${VERSION})"
              git push origin "$BRANCH"
              {
                printf 'Pushed an updated build (re-run of the v%s release workflow).\n\n' "$VERSION"
                printf '%s\n' "$RELEASE_DELTA"
              } > /tmp/pr_comment.md
              gh pr comment "$EXISTING_PR" --repo Mudlet/mudlet-package-repository \
                --body-file /tmp/pr_comment.md
            fi
          else
            # Sync fork main with upstream before branching
            git remote add upstream https://github.com/Mudlet/mudlet-package-repository.git
            git fetch upstream main
            git checkout main
            git reset --hard upstream/main
            git push origin main --force

            # Create a versioned branch so each release gets its own PR
            git checkout -b "$BRANCH"

            # Copy package using the canonical name (no version suffix in filename)
            cp "$GITHUB_WORKSPACE/build/Muxlet.mpackage" "packages/Muxlet.mpackage"

            git add "packages/Muxlet.mpackage"
            git commit -m "Update Muxlet to v${VERSION}"
            git push origin "$BRANCH"

            {
              printf '## Muxlet v%s\n\n' "$VERSION"
              printf 'Release Notes:\n%s\n\n' "$RELEASE_SUMMARY"
              printf 'Automated submission from [%s](https://github.com/%s) release [v%s](https://github.com/%s/releases/tag/v%s).\n\n' \
                "$GITHUB_REPOSITORY" "$GITHUB_REPOSITORY" "$VERSION" "$GITHUB_REPOSITORY" "$VERSION"
              printf '**Description:** Game-agnostic tiling window manager for Mudlet, inspired by tmux.'
            } > /tmp/pr_body.md

            gh pr create \
              --repo Mudlet/mudlet-package-repository \
              --head "${OWNER}:${BRANCH}" \
              --base main \
              --title "Update Muxlet to v${VERSION}" \
              --body-file /tmp/pr_body.md
          fi

name: Build Package

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false"               >> "$GITHUB_OUTPUT"
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "version=${LAST_TAG#v}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true"                     >> "$GITHUB_OUTPUT"
          fi

      - name: Inject version into mfile
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' mfile > "$tmp" && mv "$tmp" mfile
          echo "Version set to $VERSION"

      - name: Build with muddler
        run: docker run --rm -v "$PWD:/work" -w /work demonnic/muddler

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Muxlet-${{ steps.meta.outputs.version }}
          path: build/Muxlet.mpackage

      # ── Pre-release (every push to main) ───────────────────────────────────

      - name: Publish pre-release
        if: steps.meta.outputs.prerelease == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: Pre-release ${{ steps.meta.outputs.version }}
          tag_name: prerelease
          prerelease: true
          files: build/Muxlet.mpackage

      # ── Production release (workflow_dispatch only) ─────────────────────────

      - name: Publish production release
        if: steps.meta.outputs.prerelease == 'false'
        uses: softprops/action-gh-release@v2
        with:
          name: Muxlet v${{ steps.meta.outputs.version }}
          tag_name: v${{ steps.meta.outputs.version }}
          prerelease: false
          files: build/Muxlet.mpackage

      # MPR submission is configured separately once release builds are verified.
      # See DEVELOPER.md for the manual submission process in the meantime.
